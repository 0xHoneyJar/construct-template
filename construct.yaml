# construct.yaml — Construct pack manifest
# See: https://constructs.network/docs/schema for full reference
# Validate: yq eval '.' construct.yaml && ajv validate -s schemas/construct.schema.json

schema_version: 3

# CUSTOMIZE: Display name for registry and UI
name: "Code Review Assistant"

# CUSTOMIZE: URL-safe identifier (kebab-case, 2+ chars)
slug: code-review-assistant

# Semantic version — bump on each release
version: 1.0.0

# CUSTOMIZE: One-line description shown in registry search results
description: "Catches production issues by blast radius — the top 3-5 things that would hurt your users most"

# CUSTOMIZE: Storefront tagline (noun phrase, max 80 chars, no articles or superlatives)
short_description: "Production issue triage"

# CUSTOMIZE: Your name or organization
author: your-name

# SPDX license identifier
license: MIT

# Skills provided by this construct
# Each skill maps to a directory under skills/
skills:
  # A minimal skill — fast code review pass
  - slug: quick-review
    path: skills/example-simple

  # A full skill — documentation generation with quality gates
  - slug: write-docs
    path: skills/example-full

# Slash commands registered in the runtime
# Each command maps to a markdown file under commands/
commands:
  - name: quick-review
    path: commands/example-command.md

# Repository metadata
repository:
  url: https://github.com/your-org/construct-code-review.git
  homepage: https://constructs.network/constructs/code-review-assistant

# Event bus integration (optional — Level 2)
# Uncomment when your construct emits or consumes events from other constructs
# events:
#   emits:
#     - type: forge.code-review.issues_found
#       description: Emitted when review finds issues
#       data_schema:
#         file_path: string
#         severity: string
#         count: number
#   consumes:
#     - event: forge.observer.feedback_captured

# Dependencies on other construct packs (optional — Level 2)
# Uncomment when your construct depends on another
# pack_dependencies:
#   - slug: observer
#     version: ">=1.0.0"

# Identity files for persona and expertise
identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml

# Post-install hook (optional)
hooks:
  post_install: scripts/install.sh

# Quick start command shown after installation
quick_start:
  command: /quick-review
  description: "Run a fast review of your latest changes — surfaces the top issues by blast radius"
